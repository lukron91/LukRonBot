<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>LukRon Bot Manager</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f1115; color: #fff; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #16181d; padding: 20px; border-bottom: 1px solid #1e2029; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { margin: 0; font-size: 20px; color: #5865f2; }
        .status-badge { display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #ed4245; box-shadow: 0 0 10px #ed4245; transition: all 0.3s; }
        .dot.online { background: #23a559; box-shadow: 0 0 10px #23a559; }
        
        .main { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 250px; background: #16181d; border-right: 1px solid #1e2029; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .btn { padding: 14px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-start { background: #23a559; color: white; }
        .btn-start:hover { background: #1e8e4a; }
        .btn-stop { background: #ed4245; color: white; }
        .btn-stop:hover { background: #c03537; }
        .btn-register { background: #faa61a; color: white; }
        .btn-register:hover { background: #d48c0e; }
        .btn:disabled { background: #4e5058 !important; cursor: not-allowed; opacity: 0.5; }
        
        .console-area { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow: hidden; }
        .console-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .console-header h2 { margin: 0; font-size: 18px; }
        .console { flex: 1; background: #0a0b0e; border: 1px solid #1e2029; border-radius: 8px; padding: 15px; font-family: 'Consolas', 'Courier New', monospace; font-size: 13px; overflow-y: auto; color: #b9bbbe; line-height: 1.5; }
        .log-info { color: #b9bbbe; }
        .log-success { color: #23a559; }
        .log-error { color: #ed4245; }
        .log-warning { color: #faa61a; }
    </style>
</head>
<body>

<div class="header">
    <h1>🤖 LukRon Bot Manager</h1>
    <div class="status-badge">
        <div id="statusDot" class="dot"></div>
        <span id="statusText">Offline</span>
    </div>
</div>

<div class="main">
    <div class="sidebar">
        <button id="btnStart" class="btn btn-start" onclick="controlBot('start')">▶ Uruchom bota</button>
        <button id="btnStop" class="btn btn-stop" onclick="controlBot('stop')" disabled>⏹ Zatrzymaj bota</button>
        <button id="btnRegister" class="btn btn-register" onclick="registerCommands()">📝 Rejestruj komendy</button>
        
        <div style="margin-top: auto; font-size: 12px; color: #6d7280;">
            <p>Port: 3001</p>
            <p>Node.js: Active</p>
        </div>
    </div>

    <div class="console-area">
        <div class="console-header">
            <h2>📜 Live Logi</h2>
            <button onclick="clearLogs()" style="background:none; border:none; color:#6d7280; cursor:pointer;">Wyczyść</button>
        </div>
        <div id="console" class="console"></div>
    </div>
</div>

<script>
    const consoleEl = document.getElementById('console');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const btnStart = document.getElementById('btnStart');
    const btnStop = document.getElementById('btnStop');
    const btnRegister = document.getElementById('btnRegister');
    let botLogs = [];

    async function updateStatus() {
        try {
            const res = await fetch('/api/status');
            const data = await res.json();
            
            if (data.running) {
                statusDot.classList.add('online');
                statusText.innerText = 'Online';
                statusText.style.color = '#23a559';
                btnStart.disabled = true;
                btnStop.disabled = false;
            } else {
                statusDot.classList.remove('online');
                statusText.innerText = 'Offline';
                statusText.style.color = '#ed4245';
                btnStart.disabled = false;
                btnStop.disabled = true;
            }
            
            updateConsole(data.logs);
        } catch (e) {
            console.error(e);
        }
    }

    function updateConsole(logs) {
        const wasAtBottom = consoleEl.scrollHeight - consoleEl.clientHeight <= consoleEl.scrollTop + 50;
        
        let html = logs.map(log => {
            if (log.includes('🟢') || log.includes('✅')) return `<div class="log-success">${log}</div>`;
            if (log.includes('🔴') || log.includes('❌')) return `<div class="log-error">${log}</div>`;
            if (log.includes('⚠️') || log.includes('📝')) return `<div class="log-warning">${log}</div>`;
            return `<div class="log-info">${log}</div>`;
        }).join('');
        
        consoleEl.innerHTML = html;
        if (wasAtBottom) consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    async function controlBot(action) {
        try {
            await fetch(`/api/${action}`, { method: 'POST' });
            setTimeout(updateStatus, 500);
        } catch (e) {
            alert('Błąd połączenia z managerem!');
        }
    }

    async function registerCommands() {
        try {
            const res = await fetch('/api/register-commands', { method: 'POST' });
            const data = await res.json();
            
            if (data.success) {
                const time = new Date().toLocaleTimeString();
                botLogs.push(`[${time}] 📝 Rozpoczynanie rejestracji komend...`);
                updateConsole(botLogs);
            } else {
                alert('Błąd: ' + data.message);
            }
        } catch (e) {
            alert('Błąd połączenia z managerem!');
        }
    }

    function clearLogs() {
        botLogs = [];
        consoleEl.innerHTML = '';
    }

    setInterval(updateStatus, 2000);
    updateStatus();
</script>

</body>
</html>
