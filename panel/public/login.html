<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel — Logowanie</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #cc0000;
    --red-dark: #1a0000;
    --bg: #0a0a0a;
    --card: #111;
    --border: #1e1e1e;
    --text: #e0e0e0;
    --muted: #555;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-image: repeating-conic-gradient(#0d0d0d 0% 25%, #0a0a0a 0% 50%);
    background-size: 8px 8px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-top: 3px solid var(--red);
    padding: 48px 40px;
    width: 360px;
    position: relative;
  }
  .card::before { content: ''; position: absolute; top: -1px; left: -1px; width: 16px; height: 16px; border-top: 3px solid var(--red); border-left: 3px solid var(--red); }
  .card::after  { content: ''; position: absolute; top: -1px; right: -1px; width: 16px; height: 16px; border-top: 3px solid var(--red); border-right: 3px solid var(--red); }
  .logo {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--red);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  p {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 36px;
    line-height: 1.5;
  }
  .btn-discord {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: var(--red-dark);
    border: 1px solid var(--red);
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-decoration: none;
    padding: 14px 24px;
    width: 100%;
    transition: background 0.2s;
    cursor: pointer;
  }
  .btn-discord:hover { background: #2a0000; }
  .btn-discord svg { width: 20px; height: 20px; fill: #fff; flex-shrink: 0; }
  .corner-bl { position: absolute; bottom: -1px; left: -1px; width: 16px; height: 16px; border-bottom: 1px solid var(--red); border-left: 1px solid var(--red); }
  .corner-br { position: absolute; bottom: -1px; right: -1px; width: 16px; height: 16px; border-bottom: 1px solid var(--red); border-right: 1px solid var(--red); }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Panel administracyjny</div>
  <h1>Zaloguj się</h1>
  <p>Dostęp tylko dla uprawnionych członków serwera Discord.</p>
  <a class="btn-discord" href="/auth/discord">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.03.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
    Zaloguj przez Discord
  </a>
  <div class="corner-bl"></div>
  <div class="corner-br"></div>
</div>
</body>
</html>
